  notified_body_certificate: CE 2797/MDR/2026/001 — MedTriage Assist v3.x, Class IIa
  notes: >
    MDR Class IIa medical device; Notified Body conformity assessment required
    under Article 52(4) MDR. Also classified as high-risk AI under Annex I MDR
    (safety component), invoking Article 6(1) of the EU AI Act.
    MDR CE mark: MDD → MDR transition completed 2025-12-31.

post_market_monitoring:
  monitoring_approach: >
    Post-Market Clinical Follow-Up (PMCF) per MDCG 2020-7 and MDR Annex XIV.
    Monthly discordance analysis (AI proposal vs nurse decision vs final clinical outcome).
    Quarterly under-triage rate evaluation against 5% threshold. Annual PMCF report
    submitted to BSI Group. Serious incident reporting per MDR Article 87 and
    EU AI Act Article 73.

  key_performance_indicators:
    - "Under-triage rate < 5% (aggregate) — monthly"
    - "Under-triage rate < 7% for any subgroup — monthly"
    - "Exact category agreement ≥ 0.75 (aggregate) — quarterly"
    - "Nurse discordance rate 8–20% (too low = automation bias; too high = clinical concern)"
    - "Confidence suppression rate < 15% (predictions below 0.60 threshold) — monthly"
    - "Italian exact agreement ≥ 0.76 — quarterly (improvement target)"

  drift_detection_method: >
    Monthly distribution monitoring on vital sign features (PSI). Quarterly
    re-validation on rolling prospective cohort (n ≈ 5 000/quarter per language).

  update_trigger_thresholds: >
    Under-triage rate > 5% at aggregate OR > 7% for any subgroup → clinical hold
    and emergency Medical Advisory Board review. Category agreement drop > 0.03
    → mandatory re-evaluation before next deployment.

  responsible_person: Dr. Lena Fischer, CMO (l.fischer@medai-diagnostics.ch)
  review_frequency: Monthly PMCF dashboard; quarterly review; annual PMCF report

