general_description:
  provider:
    name: FinAI Solutions B.V.
    registration_number: KvK 87654321 (Amsterdam)
    address: Herengracht 182, 1016 BR Amsterdam, Netherlands
    contact_email: ai-compliance@finai-solutions.eu
    authorized_signatory: Pieter van der Berg, Chief Risk Officer
    ai_governance_owner: Sophie Müller, AI Ethics Officer
