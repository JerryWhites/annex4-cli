post_market_monitoring:
  monitoring_approach: >
    Monthly AUC-ROC on live-labelled cohort (12-month rolling, n ≈ 15 000/month).
    Weekly PSI on input features. Quarterly Gini and vintage analysis.
    Bi-annual full external validation.

  key_performance_indicators:
    - "AUC-ROC ≥ 0.82 (aggregate) — monthly"
    - "AUC-ROC ≥ 0.79 (per product) — monthly"
    - "PSI < 0.20 (weekly alert) / < 0.25 (mandatory review trigger)"
    - "Gini ≥ 0.62 — quarterly"
    - "Fairness delta (gender) ≤ ±6 pp — quarterly"

  drift_detection_method: >
    PSI on 20 most predictive features, weekly. Monthly characteristic analysis reports.

  update_trigger_thresholds: >
    PSI > 0.25 → immediate model review. AUC drop > 0.03 from baseline → emergency retrain.

  responsible_person: Sophie Müller, AI Ethics Officer (s.muller@finai-solutions.eu)
  review_frequency: Monthly dashboard; bi-annual full validation

