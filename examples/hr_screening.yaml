# ─────────────────────────────────────────────────────────────────────────────
# Section 1 — General description
# Annex IV §1 | Articles 3, 13, 26
# ─────────────────────────────────────────────────────────────────────────────
general_description:
  provider:
    name: TalentFlow AI GmbH
    registration_number: HRB 242301 B (Amtsgericht Charlottenburg)
    address: Unter den Linden 42, 10117 Berlin, Germany
    contact_email: ai-compliance@talentflow-ai.de
    authorized_signatory: Dr. Erika Muster, Chief Executive Officer
    ai_governance_owner: Jan Kovář, Head of AI Governance
    eu_representative: TalentFlow AI GmbH (established in the Union)

  system:
    name: TalentFlow ScreenAI
    version: 1.2.0
    git_commit: a3f9c12d
    release_date: "2026-03-15"
    classification: "High-risk — Annex III §4(a), Article 6(2)"
    annex_iii_category: "Employment, workers management and access to self-employment — Annex III §4(a)"
    regulation_version: 2024-1689_base

  intended_purpose:
    description: >
      TalentFlow ScreenAI automatically screens, ranks, and shortlists job applications
      for white-collar and technical positions. The system analyses structured applicant
      data (CV text, application form fields) and produces a ranked shortlist with
      explanatory score breakdowns for each candidate. The system is designed to assist —
      not replace — human recruiters in the initial screening phase.
    intended_users: >
      HR professionals and recruitment specialists at partner organisations who use
      TalentFlow ScreenAI as an assistive tool for initial candidate screening.
      All system outputs require human review before any employment decision is made.
    deployment_form: SaaS — accessed via web dashboard and REST API
    geographic_scope: European Union; not validated for use outside EU member states
    persons_affected: >
      Natural persons who submit job applications to organisations using TalentFlow ScreenAI.
      Applicants are notified of AI-assisted screening in the job posting and application form.
    foreseeable_misuse:
      - Automated rejection without human review of individual candidates
      - Use as the sole basis for employment decisions without recruiter oversight
      - Screening on characteristics not listed in the approved feature set
      - Deployment in jurisdictions outside the validated geographic scope

# ─────────────────────────────────────────────────────────────────────────────
# Section 2 — Development process
# Annex IV §2 | Articles 9, 10
# ─────────────────────────────────────────────────────────────────────────────
development_process:
  methodology: >
    Supervised learning using gradient-boosted trees (XGBoost 2.0) trained on
    six years of historical recruitment data. Feature engineering pipeline
    extracts structured signals from free-text CV fields via a fine-tuned
    sentence-transformer (multilingual MiniLM-L12) frozen at inference time.
    Model selection via 5-fold cross-validation with stratified splits.
    Final model selected on balanced accuracy across gender subgroups.

  architecture_description: >
    Two-stage pipeline: (1) NLP feature extractor (sentence-transformer,
    768-dim embeddings, CPU inference) → (2) XGBoost classifier (500 estimators,
    max_depth=6, learning_rate=0.05). Output: a continuous score [0, 1]
    representing screening probability, plus SHAP feature importance breakdown
    for each prediction. No generative AI components. No real-time learning.

  input_description: >
    Structured applicant record containing: CV text (free-form, up to 5 000 tokens),
    application form fields (role applied for, years of experience, highest
    qualification), and optionally a cover letter. All personal identifiers
    (name, address, contact details, date of birth) are stripped before
    the record reaches the model via a PII-removal preprocessor.

  output_description: >
    A ranked shortlist of candidates with: screening score [0–100], SHAP
    feature breakdown (top-5 contributing features per candidate), and a
    plain-language summary of the main factors. The shortlist is delivered
    to the recruiter dashboard. No direct communication with applicants.

  pre_trained_components: >
    multilingual-MiniLM-L12-v2 (sentence-transformers, Apache-2.0 licence).
    Weights frozen; not fine-tuned on TalentFlow data. Used solely for
    embedding generation.



