# ─────────────────────────────────────────────────────────────────────────────
# Section 3 — Monitoring, functioning and control
# Annex IV §3 | Article 13, 14, 15
# ─────────────────────────────────────────────────────────────────────────────
monitoring_functioning_control:
  capabilities_and_limitations: >

  foreseeable_unintended_outcomes: >
    (1) Perpetuation of historical hiring biases embedded in training data despite
    mitigation measures. (2) Proxy discrimination via non-protected features that
    correlate with protected characteristics (e.g., institution names as proxies for
    socioeconomic background). (3) Over-reliance by recruiters on AI score without
    reading underlying rationale. (4) Gaming by applicants aware of high-scoring
    CV patterns. (5) Disparate impact on applicants with non-linear career histories
    (e.g., career breaks for caregiving) which the model has limited training signal for.

  human_oversight_measures: >
    (1) All shortlisted candidates must be reviewed by a qualified recruiter before
    invitation to interview. Automatic progression is technically blocked. (2) SHAP
    explanations are displayed alongside every score to support informed human review.
    (3) Recruiters can override the system ranking at any time with a mandatory
    rationale field. (4) AI Governance Officer reviews override rates monthly; spikes
    trigger model review. (5) All deployer staff with access to the dashboard must
    complete the mandatory AI literacy training module (min. 2 hours) before activation.

  accuracy_metrics:
    - name: Balanced Accuracy
      aggregate_value: "0.86"
      confidence_interval: "[0.84, 0.88] at 95% CI"
      methodology_note: >
        Evaluated on TalentFlow Holdout 2024 (62 000 records). Balanced accuracy
        accounts for class imbalance (87% negative, 13% positive rate in holdout).
      subpopulation_breakdown:
        - subpopulation: "Gender: female"
          value: "0.84"
          delta_vs_aggregate: "-0.02"
        - subpopulation: "Gender: male"
          value: "0.87"
          delta_vs_aggregate: "+0.01"
        - subpopulation: "Age: 18–34"
          value: "0.88"
          delta_vs_aggregate: "+0.02"
        - subpopulation: "Age: 35–49"
          value: "0.86"
          delta_vs_aggregate: "0.00"
        - subpopulation: "Age: 50+"
          value: "0.82"
          delta_vs_aggregate: "-0.04"

    - name: False Negative Rate (qualified candidates missed)
      aggregate_value: "0.09"
      methodology_note: >
        FNR evaluated at operating threshold 0.55. Recruiter review mitigates impact
        of false negatives through manual review of candidates near the threshold.
      subpopulation_breakdown:
        - subpopulation: "Gender: female"
          value: "0.11"
          delta_vs_aggregate: "+0.02"
        - subpopulation: "Age: 50+"
          value: "0.14"
          delta_vs_aggregate: "+0.05"

  robustness_issues:
    - id: ROB-001
      category: Adversarial input — CV keyword stuffing
      severity: Low
      status: Accepted
      rationale: >
        Applicants may inflate CV text with high-scoring keywords. SHAP explanations
        make this detectable by the reviewing recruiter. No automated countermeasure
        implemented; accepted as residual risk. Monitoring: flagging logic planned for v1.3.

  cybersecurity_measures: >
    All API endpoints authenticated via OAuth 2.0 (client credentials flow).
    PII removed server-side before model inference (dedicated anonymisation service,
    pen-tested annually). Model artefacts signed and stored in isolated artifact registry.
    No model weights exposed via API. SOC 2 Type II audit scheduled Q4 2026.

# ─────────────────────────────────────────────────────────────────────────────
# Section 4 — Risk management system
# Annex IV §4 | Article 9
# ─────────────────────────────────────────────────────────────────────────────
risk_management:
  process_description: >
    Quarterly risk review conducted by the AI Governance Committee (CTO, Head of AI
    Governance, Legal Counsel, DPO). Risk register maintained in the internal JIRA
    project AIGRISK. Each identified risk is assessed for likelihood and impact,
    assigned a mitigation owner, and tracked to resolution or formal acceptance.
    Unresolved HIGH risks block new model releases.

  identified_risks:
    - risk: Disparate impact on female applicants — screening rate below parity
      likelihood: Medium
      impact: High
      mitigation: >
        Equalized-odds re-weighting applied in training. Monthly fairness dashboard
        monitored by AI Governance Officer. Threshold for corrective action: delta > 5 pp.
      residual_risk: Delta currently −2.8 pp; within accepted ±5 pp threshold.
      accepted_by: AI Governance Committee, 2026-01-20

    - risk: Disparate impact on 50+ applicants — underrepresentation in shortlists
      likelihood: Medium
      impact: High
      mitigation: >
        Age-proxy features removed from feature set. Sub-population monitoring
        in production. Corrective action (targeted retraining) scheduled for v1.3
        if delta remains above −3 pp at Q3 2026 evaluation.
      residual_risk: Delta −3.7 pp; elevated monitoring status.
      accepted_by: AI Governance Committee, 2026-01-20

    - risk: Recruiter over-reliance — decisions made without reading SHAP explanations
      likelihood: Medium
      impact: Medium
      mitigation: >
        UI design forces mandatory display of top-3 SHAP features before the
        shortlist can be acted upon. AI literacy training required for all users.
        Override rate monitored monthly.
      residual_risk: Low; UX controls and training reduce likelihood significantly.
      accepted_by: Head of Product, 2026-02-05

    - risk: Eastern EU sub-population underperformance — insufficient training data
      likelihood: High
      impact: Medium
      mitigation: >
        Known limitation disclosed to all deployers in the system documentation.
        Deployers advised to apply additional human review for affected applicant
        profiles. Active data collection programme with 3 Eastern EU partner organisations.
      residual_risk: Medium; data gap to be addressed in v1.4 (target Q4 2026).
      accepted_by: AI Governance Committee, 2026-01-20

  residual_risk_acceptance: >
    All residual risks have been formally accepted by the AI Governance Committee.
    Acceptance is conditional on the monitoring programme remaining active and the
    v1.3 / v1.4 corrective actions being delivered on schedule.

