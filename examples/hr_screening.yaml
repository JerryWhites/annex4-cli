# ─────────────────────────────────────────────────────────────────────────────
# Section 8 — Post-market monitoring
# Annex IV §8 | Article 72
# ─────────────────────────────────────────────────────────────────────────────
post_market_monitoring:
  monitoring_approach: >
    Monthly evaluation of balanced accuracy and fairness metrics on a live-labelled
    holdout sample (rolling 90-day window, n ≈ 8 000 records per month). Drift
    detection via Population Stability Index (PSI) on top-20 input features.
    Quarterly review by AI Governance Committee with mandatory corrective action
    trigger if any KPI breaches its threshold.

  key_performance_indicators:
    - "Balanced accuracy ≥ 0.82 (aggregate)"
    - "Fairness delta (gender) ≤ ±5 pp vs aggregate"
    - "Fairness delta (age 50+) ≤ ±5 pp vs aggregate"
    - "False negative rate ≤ 0.12"
    - "PSI (input features) < 0.20 (alert) / < 0.25 (model review)"
    - "Recruiter override rate < 15% (trigger: governance review)"

  drift_detection_method: >
    Population Stability Index (PSI) computed weekly on the distribution of the
    top-20 SHAP features. Alert threshold PSI > 0.20; model review triggered at PSI > 0.25.

  update_trigger_thresholds: >
    Any KPI breach sustained over 2 consecutive monthly evaluations triggers mandatory
    model review. A breach of the fairness KPIs triggers an emergency governance
    review within 14 days.

  responsible_person: Jan Kovář, Head of AI Governance (jan.kovar@talentflow-ai.de)
  review_frequency: Monthly KPI dashboard; quarterly full governance review

