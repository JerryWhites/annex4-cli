name: Regulation Integrity

on:
  pull_request:
    paths:
      - 'annex4/regulation/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install pyyaml
    - name: Validate YAML syntax
      run: |
        find annex4/regulation -name "*.yaml" -exec python -c "import yaml, sys; print(f'Validating {sys.argv[1]}'); yaml.safe_load(open(sys.argv[1]))" {} \;
    # Add more steps here in future PRs to validate cross-references and sha256
