identifier: '13'
title: Transparency and provision of information to deployers
text: "1. High-risk AI systems shall be designed and developed in such a way as to\
  \ ensure that their operation is sufficiently transparent to enable deployers to\
  \ interpret the system's output and use it appropriately. An appropriate type and\
  \ degree of transparency shall be ensured with a view to achieving compliance with\
  \ the relevant obligations of the provider and deployer set out in Chapter 3 of\
  \ this Title.\n2. High-risk AI systems shall be accompanied by instructions for\
  \ use in an appropriate digital or non-digital format, including online, that contain\
  \ concise, complete, correct and clear information that is relevant, accessible\
  \ and comprehensible to deployers.\n3. The instructions for use shall contain at\
  \ least the following information:\n(a) the identity and the contact details of\
  \ the provider and, where applicable, of its authorised representative;\n(b) the\
  \ characteristics, capabilities and limitations of performance of the high-risk\
  \ AI system, including:\n    (i) its intended purpose;\n    (ii) the level of accuracy,\
  \ including its metrics, robustness and cybersecurity referred to in Article 15\
  \ against which the high-risk AI system has been tested and validated and which\
  \ can be expected;\n    (iii) any known or foreseeable circumstances, related to\
  \ the use of the high-risk AI system in accordance with its intended purpose or\
  \ under conditions of reasonably foreseeable misuse, which may lead to risks to\
  \ the health and safety or fundamental rights referred to in Article 9(2);\n   \
  \ (iv) where applicable, the technical capabilities and characteristics of the high-risk\
  \ AI system to provide information that is relevant to its explainability;\n   \
  \ (v) where applicable, its performance regarding specific persons or groups of\
  \ persons on which the system is intended to be used;\n    (vi) where applicable,\
  \ specifications for the input data, or any other relevant information in terms\
  \ of the training, validation and testing data sets used, taking into account the\
  \ intended purpose of the high-risk AI system;\n(c) the changes to the high-risk\
  \ AI system and its performance which have been pre-determined by the provider at\
  \ the moment of the initial conformity assessment, if any;\n(d) the human oversight\
  \ measures referred to in Article 14;\n(e) the computational and hardware resources\
  \ needed, the expected lifetime of the high-risk AI system and any necessary maintenance\
  \ and care measures.\n"
