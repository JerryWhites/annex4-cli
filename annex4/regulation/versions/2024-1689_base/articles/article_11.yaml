identifier: '11'
title: Technical documentation
text: '1. Before a high-risk AI system is placed on the market or put into service,
  the provider of that system shall draw up technical documentation of that system.
  The technical documentation shall be drawn up in such a way as to demonstrate that
  the high-risk AI system complies with the requirements set out in this Chapter and
  provide national competent authorities and notified bodies with all the necessary
  information to assess the compliance of the AI system with those requirements. The
  technical documentation shall contain, at a minimum, the elements set out in Annex
  IV.

  2. Where a high-risk AI system related to a product covered by the Union harmonisation
  legislation listed in Annex I is placed on the market or put into service, a single
  set of technical documentation shall be drawn up containing all the information
  set out in paragraph 1 and the information required under those Union harmonisation
  legislation acts.

  3. Providers shall keep the technical documentation up-to-date for the lifetime
  of the high-risk AI system.

  4. The Commission is empowered to adopt delegated acts in accordance with Article
  97 to amend Annex IV where necessary to ensure that, in light of technical progress,
  the technical documentation provides all the necessary information to assess the
  compliance of the system with the requirements set out in this Chapter.

  '
