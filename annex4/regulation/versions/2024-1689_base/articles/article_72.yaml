identifier: '72'
title: Post-market monitoring by providers and post-market monitoring plan for high-risk
  AI systems
text: '1. Providers of high-risk AI systems shall establish and document a post-market
  monitoring system in a manner that is proportionate to the nature of the artificial
  intelligence technologies and the risks of the high-risk AI system.

  2. The post-market monitoring system shall actively and systematically collect,
  document and analyse relevant data provided by deployers or collected through other
  sources on the performance of high-risk AI systems throughout their lifetime, and
  that allow the provider to evaluate the continuous compliance of AI systems with
  the requirements set out in Chapter 2 of this Title. Where relevant, post-market
  monitoring shall include an analysis of the interaction with other AI systems. This
  obligation shall not cover sensitive operational data of deployers who are law enforcement
  authorities.

  3. The post-market monitoring system shall be based on a post-market monitoring
  plan. The post-market monitoring plan shall be part of the technical documentation
  referred to in Annex IV. The Commission shall adopt an implementing act laying down
  detailed provisions establishing a template for the post-market monitoring plan
  and the list of elements to be included in the plan.

  4. For high-risk AI systems covered by the legal acts referred to in Annex I, where
  a post-market monitoring system and plan is already established under that legislation,
  in order to ensure consistency, avoid duplications and minimise additional burdens,
  providers shall have the choice of integrating, where appropriate, the necessary
  elements described in paragraphs 1, 2 and 3 using the templates existing under that
  legislation.

  5. In the case of high-risk AI systems, providers shall ensure that the post-market
  monitoring system allows them to identify the need for a corrective action in accordance
  with Article 20.

  '
