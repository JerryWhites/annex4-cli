identifier: '26'
title: Obligations of deployers of high-risk AI systems
text: '1. Deployers of high-risk AI systems shall take appropriate technical and organisational
  measures to ensure they use such systems in accordance with the instructions for
  use accompanying the systems, pursuant to paragraphs 3 and 6.

  2. Deployers shall assign the task of human oversight referred to in Article 14(1)
  and (2) to natural persons who have the necessary competence, training and authority,
  as well as the necessary resources.

  3. The obligations set out in paragraphs 1 and 2 are without prejudice to other
  deployer obligations under Union or national law and to the deployer''s freedom
  to organise its own resources and activities for the purpose of implementing the
  human oversight measures referred to in Article 14.

  5. Deployers of high-risk AI systems shall monitor the operation of the high-risk
  AI system on the basis of the instructions for use and, where relevant, inform providers
  in accordance with Article 72.

  6. Deployers shall keep the logs automatically generated by a high-risk AI system
  to the extent such logs are under their control pursuant to Article 12(1). The logs
  shall be kept for a period of at least six months, unless provided otherwise by
  applicable Union or national law, in particular Union law on the protection of personal
  data.

  7. Deployers of high-risk AI systems that are obliged, pursuant to relevant Union
  or national law, to conduct a fundamental rights impact assessment shall perform
  that assessment prior to deploying the AI system. To support them, the Commission
  shall develop a template for fundamental rights impact assessment.

  9. Before putting into service or using a high-risk AI system at the workplace,
  deployers who are employers shall inform workers'' representatives and the workers
  who will be subject to it of the use of the high-risk AI system.

  '
