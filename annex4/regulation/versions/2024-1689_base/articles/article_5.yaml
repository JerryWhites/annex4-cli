identifier: '5'
title: Prohibited artificial intelligence practices
text: '1. The following artificial intelligence practices shall be prohibited:

  (a) the placing on the market, putting into service or use of an AI system that
  deploys subliminal techniques beyond a person''s consciousness or purposefully manipulative
  or deceptive techniques, with the objective or the effect of materially distorting
  the behaviour of a person or a group of persons by appreciably impairing their ability
  to make an informed decision, thereby causing that person or another person to take
  a decision that they would not have taken otherwise, and which causes or is reasonably
  likely to cause that person, another person or group of persons significant harm;

  (b) the placing on the market, putting into service or use of an AI system that
  exploits any of the vulnerabilities of a person or a specific group of persons due
  to their age, disability or a specific social or economic situation, with the objective
  or the effect of materially distorting the behaviour of that person or a person
  belonging to that group in a manner that causes or is reasonably likely to cause
  that person or another person significant harm;

  (c) AI systems for social scoring by public authorities or on their behalf, leading
  to detrimental or unfavourable treatment of certain natural persons or groups in
  social contexts unrelated to the contexts in which data was originally generated;

  (d) AI systems that assess the risk of a natural person committing a criminal offence
  based solely on profiling or on assessing personality traits and characteristics,
  except when used to augment a human assessment based on objective and verifiable
  facts directly linked to a criminal activity;

  (e) the placing on the market, putting into service or use of AI systems that create
  or expand facial recognition databases through the untargeted scraping of facial
  images from the internet or CCTV footage;

  (f) the placing on the market, putting into service or use of AI systems to infer
  emotions of a natural person in the areas of workplace and education institutions,
  except where the use is for medical or safety reasons;

  (g) the placing on the market, putting into service or use of biometric categorisation
  systems that categorise individually natural persons based on their biometric data
  to deduce or infer their race, political opinions, trade union membership, religious
  or philosophical beliefs, sex life or sexual orientation;

  (h) the use of real-time remote biometric identification systems in publicly accessible
  spaces for the purpose of law enforcement, unless and in so far as such use is strictly
  necessary for one of the following objectives: targeted search for specific victims
  of abduction, trafficking in human beings or sexual exploitation; prevention of
  a specific, substantial and imminent threat to the life or physical safety of natural
  persons or a terrorist attack; identification or localisation of a person suspected
  of having committed an offence listed in Annex II.

  '
