identifier: '16'
title: Obligations of providers of high-risk AI systems
text: 'Providers of high-risk AI systems shall:

  (a) ensure that their high-risk AI systems are compliant with the requirements set
  out in Chapter 2 of this Title;

  (b) have a quality management system in place pursuant to Article 17;

  (c) draw up the technical documentation of the high-risk AI system pursuant to Article
  11 and Annex IV;

  (d) when under their control, keep the logs automatically generated by their high-risk
  AI systems as referred to in Article 12(1);

  (e) ensure that the high-risk AI system undergoes the relevant conformity assessment
  procedure pursuant to Article 43, prior to its placing on the market or putting
  into service;

  (f) comply with the registration obligations referred to in Article 49(1);

  (g) take the necessary corrective actions and provide information as required pursuant
  to Article 20;

  (h) upon reasoned request of a national competent authority, provide that authority
  with all the information and documentation necessary to demonstrate the conformity
  of the high-risk AI system with the requirements set out in Chapter 2 of this Title;

  (i) inform the national competent authorities of the Member States in which they
  made the high-risk AI system available or put it into service and, where applicable,
  the notified body, of any serious incident in accordance with Article 73.

  '
