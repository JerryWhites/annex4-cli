identifier: '47'
title: EU declaration of conformity
text: '1. The provider shall draw up a written EU declaration of conformity for each
  high-risk AI system and keep it at the disposal of the national competent authorities
  for 10 years after the high-risk AI system has been placed on the market or put
  into service. The EU declaration of conformity shall identify the high-risk AI system
  for which it has been drawn up. A copy of the EU declaration of conformity shall
  be submitted to the relevant national competent authorities upon request.

  2. The EU declaration of conformity shall state that the high-risk AI system concerned
  meets the requirements set out in Chapter 2 of this Title. The EU declaration of
  conformity shall contain the information set out in Annex V and shall be translated
  into the language(s) required by the Member State(s) in which the high-risk AI system
  is made available.

  3. Where high-risk AI systems are subject to other Union harmonisation legislation
  which also requires an EU declaration of conformity, a single EU declaration of
  conformity shall be drawn up in respect of all Union law applicable to the high-risk
  AI system. The declaration shall contain all the information required for the identification
  of the Union harmonisation legislation to which the declaration relates.

  4. By drawing up the EU declaration of conformity, the provider shall assume responsibility
  for compliance with the requirements set out in Chapter 2 of this Title. The provider
  shall keep the EU declaration of conformity up-to-date as appropriate.

  '
