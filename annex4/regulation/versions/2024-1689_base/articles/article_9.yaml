identifier: '9'
title: Risk management system
text: '1. A risk management system shall be established, implemented, documented and
  maintained in relation to high-risk AI systems. The risk management system shall
  be understood as a continuous iterative process planned and run throughout the entire
  lifecycle of a high-risk AI system, requiring regular systematic review and updating.

  2. The risk management system shall comprise the following steps:

  (a) the identification and analysis of the known and reasonably foreseeable risks
  that the high-risk AI system can pose to health, safety or fundamental rights when
  the high-risk AI system is used in accordance with its intended purpose;

  (b) the estimation and evaluation of the risks that may emerge when the high-risk
  AI system is used in accordance with its intended purpose, and under conditions
  of reasonably foreseeable misuse;

  (c) the evaluation of other risks possibly arising, based on the analysis of data
  gathered from the post-market monitoring system referred to in Article 72;

  (d) the adoption of appropriate and targeted risk management measures designed to
  address the risks identified.

  4. The risk management measures referred to in point (d) of paragraph 2 shall give
  due consideration to the effects and possible interactions resulting from the combined
  application of the requirements set out in Chapter 2. They shall take into account
  the generally acknowledged state of the art, including as reflected in relevant
  harmonised standards or common specifications.

  5. The risk management measures referred to in point (d) of paragraph 2 shall be
  such that the relevant residual risk associated with each hazard as well as the
  overall residual risk of the high-risk AI systems is judged to be acceptable.

  6. Testing of high-risk AI systems shall be performed in order to identify the most
  appropriate and targeted risk management measures. Testing shall ensure that high-risk
  AI systems perform consistently for their intended purpose and they are in compliance
  with the requirements set out in this Chapter.

  '
