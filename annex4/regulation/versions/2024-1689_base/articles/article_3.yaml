identifier: '3'
title: Definitions
text: 'For the purposes of this Regulation, the following definitions apply:

  (1) ''AI system'' means a machine-based system designed to operate with varying
  levels of autonomy and that may exhibit adaptiveness after deployment and that,
  for explicit or implicit objectives, infers, from the input it receives, how to
  generate outputs such as predictions, content, recommendations, or decisions that
  can influence physical or virtual environments;

  (2) ''provider'' means a natural or legal person, public authority, agency or other
  body that develops an AI system or that has an AI system developed with a view to
  placing it on the market or putting it into service under its own name or trademark,
  whether for payment or free of charge;

  (3) ''deployer'' means a natural or legal person, public authority, agency or other
  body using an AI system under its authority except where the AI system is used in
  the course of a personal non-professional activity;

  (4) ''authorised representative'' means a natural or legal person located or established
  in the Union who has received and accepted a written mandate from a provider of
  an AI system to carry out the obligations and procedures established by this Regulation
  on behalf of the provider;

  (9) ''reasonably foreseeable misuse'' means the use of an AI system in a way that
  is not in accordance with its intended purpose, but which may result from reasonably
  foreseeable human behaviour or interaction with other systems;

  (49) ''serious incident'' means an incident or malfunctioning of an AI system that
  directly or indirectly leads to death or serious damage to the health of a person,
  serious and irreversible disruption of the management and operation of critical
  infrastructure, infringement of obligations under Union law intended to protect
  fundamental rights, or serious damage to property or the environment.

  '
