identifier: '73'
title: Reporting of serious incidents
text: '1. Providers of high-risk AI systems placed on the Union market shall report
  any serious incident to the market surveillance authorities of the Member States
  where that incident occurred.

  2. The report referred to in paragraph 1 shall be made immediately after the provider
  has established a causal link between the AI system and the serious incident, or
  the reasonable likelihood of such a link, and, in any event, not later than 15 days
  after the providers becomes aware of the serious incident.

  3. For the purpose of the obligation in paragraph 1 of this Article, in case of
  a serious incident that is a breach of obligations under Union law intended to protect
  fundamental rights, the provider shall report within 10 days after having become
  aware of the serious incident.

  4. Notwithstanding paragraph 2, in the event of a widespread serious incident, the
  report shall be provided immediately, and not later than 2 days after the provider
  becomes aware of that incident.

  5. The provider shall report to the relevant market surveillance authority any serious
  incident immediately after establishing a causal link between the AI system and
  the serious incident, and in any event no later than 15 days after becoming aware
  of the serious incident.

  6. Where the serious incident referred to in paragraph 1 is related to a high-risk
  AI system referred to in point (a) of the first subparagraph of Article 6(1), the
  provider shall simultaneously notify the competent authorities established pursuant
  to that Union harmonisation legislation.

  '
