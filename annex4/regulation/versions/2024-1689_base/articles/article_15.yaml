identifier: '15'
title: Accuracy, robustness and cybersecurity
text: '1. High-risk AI systems shall be designed and developed in such a way that
  they achieve an appropriate level of accuracy, robustness, and cybersecurity, and
  perform consistently in those respects throughout their lifecycle.

  2. The levels of accuracy and the relevant accuracy metrics of high-risk AI systems
  shall be declared in the accompanying instructions for use.

  3. High-risk AI systems shall be resilient as regards errors, faults or inconsistencies
  that may occur within the system or the environment in which the system operates,
  in particular due to their interaction with natural persons or other systems. Technical
  robustness measures shall be in place.

  4. High-risk AI systems shall be resilient as regards attempts by unauthorised third
  parties to alter their use, outputs or performance by exploiting the system vulnerabilities.
  The technical solutions aiming to ensure the cybersecurity of high-risk AI systems
  shall be appropriate to the relevant circumstances and the risks. The technical
  solutions to address AI specific vulnerabilities shall include, where appropriate,
  measures to prevent and control for attacks trying to manipulate the training data
  set (''data poisoning''), or pre-trained components used in training (''model poisoning''),
  inputs designed to cause the AI system to make a mistake (''adversarial examples''
  or ''model evasion''), confidentiality attacks or model flaws.

  '
