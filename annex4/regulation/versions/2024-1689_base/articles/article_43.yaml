identifier: '43'
title: Conformity assessment
text: '1. For high-risk AI systems listed in Annex III, points 1, the provider shall
  follow a conformity assessment procedure based on the involvement of a notified
  body. For AI systems intended to be used for the ''real-time'' and ''post'' remote
  biometric identification of natural persons, the provider shall apply for a conformity
  assessment by a notified body.

  2. For high-risk AI systems referred to in Annex III, points 2 to 8, providers shall
  follow the conformity assessment procedure based on internal control as referred
  to in Annex VI, which provides for an assessment by the provider without the involvement
  of a third party.

  3. For high-risk AI systems covered by the Union harmonisation legislation listed
  in Annex I, the provider shall follow the relevant conformity assessment procedure
  as required under those legislative acts. The requirements set out in Chapter 2
  of this Title shall apply to those high-risk AI systems and shall be part of that
  assessment. Points 4.3., 4.4., 4.5. and the fifth paragraph of point 4.6 of Annex
  VII shall also apply.

  4. Where, after the placing on the market or the putting into service of a high-risk
  AI system, the provider decides to make a substantial modification to the system,
  it shall carry out a new conformity assessment procedure pursuant to paragraph 1,
  2 or 3 of this Article, as applicable.

  5. The Commission is empowered to adopt delegated acts in accordance with Article
  97 to amend Annex VI in order to update and strengthen the internal control procedure,
  where necessary.

  '
