identifier: i
title: ARTIFICIAL INTELLIGENCE TECHNIQUES AND APPROACHES referred to in Article 3(1)
text: '(a) Machine learning approaches, including supervised, unsupervised and reinforcement
  learning, using a wide variety of methods including deep learning;

  (b) Logic- and knowledge-based approaches, including knowledge representation, inductive
  (logic) programming, knowledge bases, inference and deductive engines, (symbolic)
  reasoning and expert systems;

  (c) Statistical approaches, Bayesian estimation, search and optimisation methods.

  '
