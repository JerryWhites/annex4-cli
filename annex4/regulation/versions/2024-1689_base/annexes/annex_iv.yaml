identifier: iv
title: TECHNICAL DOCUMENTATION referred to in Article 11(1)
text: 'The technical documentation referred to in Article 11(1) shall contain at least
  the following information, as applicable to the relevant AI system:


  1. A general description of the AI system including:

  (a) its intended purpose, the person(s) who develop the system, the date and the
  version of the system;

  (b) how the AI system interacts or can be used to interact with hardware or software
  that is not part of the AI system itself, where applicable;

  (c) the versions of relevant software or firmware and any requirement related to
  version update;

  (d) the description of all forms in which the AI system is placed on the market
  or put into service (e.g. software package embedded into hardware, downloadable,
  API etc.);

  (e) the description of hardware on which the AI system is intended to run;

  (f) where the AI system is a component of other products, photographs or illustrations
  showing external features, marking and internal layout of those products;

  (g) copies of the instructions for use. For high-risk AI systems in the area of
  law enforcement, where disclosure would jeopardise public security, instructions
  for use may be provided in a separate document.


  2. A detailed description of the elements of the AI system and of the process for
  its development, including:

  (a) the methods and steps performed for the development of the AI system, including,
  where relevant, recourse to pre-trained systems or tools provided by third parties
  and how these have been used, integrated or modified by the provider;

  (b) the design specifications of the system, namely the logic on which the AI system
  is designed, the key design choices including the rationale and assumptions made,
  also with regard to persons or groups of persons on which the system is intended
  to be used; the main classification choices; what the system is designed to optimise
  for and the relevance of the different parameters; the decisions about any possible
  trade-off made regarding the technical solutions adopted to comply with the requirements
  set out in Chapter 2 of this Title;

  (c) the description of the system architecture explaining how software components
  build on or feed into each other and integrate into the overall processing; the
  computational resources used to develop, train, test and validate the AI system;

  (d) where relevant, the data requirements in terms of datasheets describing the
  training methodologies and techniques and the training data sets used, including
  a general description of these data sets, information about their provenance, scope
  and main characteristics; how the data was obtained and selected; labelling procedures
  (e.g. for supervised learning), data cleaning methodologies (e.g. outliers detection);

  (e) assessment of the human oversight measures needed in accordance with Article
  14.


  3. Detailed information about the monitoring, functioning and control of the AI
  system, in particular with regard to:

  (a) the capabilities and the performance of the AI system, including the level of
  accuracy and the relevant accuracy metrics, the expected level of performance for
  specific persons or groups of persons on which the system is intended to be used
  and the overall expected level of accuracy in relation to its intended purpose;

  (b) the foreseeable unintended outcomes and sources of risks to health and safety,
  fundamental rights and discrimination in view of the intended purpose of the AI
  system;

  (c) the human oversight measures needed in accordance with Article 14, including
  the technical measures implemented to facilitate the interpretation of the outputs
  of AI systems by the deployers;

  (d) specifications on input data, or any other relevant information in terms of
  the training, validation and testing data sets used.


  4. A description of the appropriateness of the performance metrics for the specific
  AI system.


  5. A detailed description of the risk management system in accordance with Article
  9.


  6. A description of any change made to the system through its lifecycle.


  7. A list of the harmonised standards applied in full or in part the references
  of which have been published in the Official Journal of the European Union; where
  no such harmonised standards have been applied, a description of the solutions adopted
  to meet the requirements set out in Chapter 2 of this Title, including a list of
  other relevant standards and technical specifications applied.


  8. A copy of the EU declaration of conformity referred to in Article 47.


  9. A detailed description of the system in place to evaluate the AI system performance
  in the post-deployment phase in accordance with Article 72, including the post-market
  monitoring plan referred to in Article 72(3).

  '
