recitals:
  - identifier: "1"
    text: "The purpose of this Regulation is to lay down a uniform legal framework in particular for the development, placing on the market and use of artificial intelligence systems in the Union, in conformity with Union values, to promote the uptake of human-centric and trustworthy artificial intelligence, while ensuring a high level of protection of health, safety, fundamental rights enshrined in the Charter, including democracy and rule of law and environmental protection, against harmful effects of artificial intelligence systems in the Union and to support innovation."
  - identifier: "2"
    text: "Artificial intelligence systems (AI systems) can be easily deployed in a multiplicity of sectors of the economy and society, including cross-border, and can circulate throughout the Union. Certain Member States have already explored the adoption of national rules to ensure that artificial intelligence is safe and is developed and used in compliance with fundamental rights obligations. Diverging national rules may lead to fragmentation of the internal market and decrease legal certainty for operators that develop or use AI systems."
